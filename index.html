<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Moises Osio — Product Designer</title>
  <link rel="stylesheet" href="style.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #fff;
      color: #111;
      min-height: 100vh;
    }

    /* ── Layout ── */
    .layout {
      display: flex;
      min-height: 100vh;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: 340px;
      min-width: 280px;
      padding: 48px 40px;
      position: fixed;
      top: 0;
      left: 0;
      height: 100vh;
      overflow-y: auto;
    }

    .avatar {
      width: 76px;
      height: 76px;
      border-radius: 50%;
      background: #e5e7eb;
      margin-bottom: 20px;
    }

    .sidebar__name {
      font-size: 24px;
      font-weight: 600;
      color: #111;
      margin-bottom: 10px;
    }

    .sidebar__title {
      font-size: 3rem;
      font-weight: 800;
      line-height: 1.05;
      letter-spacing: -0.03em;
      color: #000;
      margin-bottom: 20px;
    }

    .sidebar__tagline {
      font-size: 15px;
      line-height: 1.65;
      color: #444;
      margin-bottom: 28px;
    }

    .divider {
      border: none;
      border-top: 1px dashed #ccc;
      margin: 24px 0;
    }

    .focus-label {
      font-size: 13px;
      font-weight: 600;
      color: #111;
      margin-bottom: 12px;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .tag {
      border: 1px solid #ccc;
      border-radius: 100px;
      padding: 4px 13px;
      font-size: 13px;
      color: #333;
    }

    /* Contact */
    .contact {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .contact-item {
      display: flex;
      align-items: center;
      gap: 11px;
      font-size: 14px;
      color: #333;
      text-decoration: none;
    }

    .contact-item svg {
      flex-shrink: 0;
      color: #555;
    }

    a.contact-item:hover { color: #000; }

    /* ── Main content ── */
    .content {
      margin-left: 340px;
      flex: 1;
      padding: 48px 56px 80px;
      min-height: 100vh;
    }

    /* ── Tabs ── */
    .tabs {
      display: flex;
      gap: 24px;
      margin-bottom: 36px;
      border-bottom: 1px solid #e5e7eb;
    }

    .tab-btn {
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      padding: 0 0 14px;
      font-size: 15px;
      color: #888;
      cursor: pointer;
      font-family: inherit;
      font-weight: 400;
      transition: color 0.15s;
    }

    .tab-btn.active {
      color: #111;
      border-bottom-color: #111;
      font-weight: 500;
    }

    /* ── Panels ── */
    .panel { display: none; }
    .panel.active { display: block; }

    /* ── Work grid ── */
    .work-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 434px));
      gap: 32px;
    }

    .project-card {
      border-radius: 10px;
      overflow: hidden;
      background: #f7f7f7;
      position: relative;
      display: block;
      text-decoration: none;
      transition: transform 0.3s ease;
    }

    .project-card:hover {
      transform: scale(1.02);
    }

    .project-card__draft-badge {
      position: absolute;
      top: 12px;
      left: 12px;
      background: #fef08a;
      color: #713f12;
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      padding: 3px 8px;
      border-radius: 4px;
      z-index: 2;
      pointer-events: none;
    }

    .project-card__image {
      width: 100%;
      aspect-ratio: 4 / 3;
      background-color: #e5e7eb;
      background-image:
        linear-gradient(45deg, #d1d5db 25%, transparent 25%),
        linear-gradient(-45deg, #d1d5db 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, #d1d5db 75%),
        linear-gradient(-45deg, transparent 75%, #d1d5db 75%);
      background-size: 20px 20px;
      background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
    }

    .project-card__body {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 20px 22px 24px;
      background: linear-gradient(to top, rgba(10,10,10,0.88) 0%, rgba(10,10,10,0.45) 55%, transparent 100%);
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .project-card:hover .project-card__body {
      opacity: 1;
    }

    .project-card__title {
      font-size: 16px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 6px;
      line-height: 1.35;
    }

    .project-card__subtitle {
      font-size: 14px;
      color: rgba(255,255,255,0.75);
      line-height: 1.55;
      margin-bottom: 14px;
    }

    .project-card__link {
      font-size: 14px;
      font-weight: 500;
      color: rgba(255,255,255,0.9);
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }

    /* ── About ── */
    .about-heading {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 28px;
      letter-spacing: -0.02em;
    }

    .about-body p {
      font-size: 17px;
      line-height: 1.75;
      color: #333;
      margin-bottom: 20px;
      max-width: 640px;
    }

    /* ── Publications ── */
    .publications-heading {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 28px;
      letter-spacing: -0.02em;
    }

    .publications-list {
      max-width: 900px;
    }

    .article {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 32px;
      padding: 32px 0;
      border-bottom: 1px solid #e5e7eb;
    }

    .article:first-of-type { border-top: 1px solid #e5e7eb; }

    .article__body { flex: 1; }

    .article__title {
      font-size: 17px;
      font-weight: 700;
      color: #111;
      line-height: 1.4;
      margin-bottom: 10px;
    }

    .article__excerpt {
      font-size: 15px;
      color: #555;
      line-height: 1.65;
      margin-bottom: 16px;
      max-width: 520px;
    }

    .article__link {
      font-size: 14px;
      font-weight: 500;
      color: #3730a3;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }

    .article__link:hover { text-decoration: underline; }

    .article__image {
      width: 180px;
      height: 180px;
      background: #e5e7eb;
      border-radius: 12px;
      flex-shrink: 0;
    }
  </style>
</head>
<body>

<div class="layout">

  <!-- ══════════ SIDEBAR ══════════ -->
  <aside class="sidebar">

    <div class="avatar"></div>

    <p class="sidebar__name"></p>
    <h1 class="sidebar__title"></h1>
    <p class="sidebar__tagline"></p>

    <hr class="divider">

    <p class="focus-label">Focus:</p>
    <div class="tags" id="sidebar-tags"></div>

    <hr class="divider">

    <div class="contact" id="sidebar-contact"></div>

  </aside>

  <!-- ══════════ MAIN CONTENT ══════════ -->
  <main class="content">

    <!-- Tab nav -->
    <nav class="tabs">
      <button class="tab-btn active" data-tab="work">Selected work</button>
      <button class="tab-btn" data-tab="about">About me</button>
      <button class="tab-btn" data-tab="publications">Publications</button>
    </nav>

    <!-- ── Panel: Selected work ── -->
    <div class="panel active" id="panel-work">
      <div class="work-grid" id="work-grid"></div>
    </div>

    <!-- ── Panel: About me ── -->
    <div class="panel" id="panel-about">
      <h2 class="about-heading">About Me</h2>
      <div class="about-body" id="about-body"></div>
    </div>

    <!-- ── Panel: Publications ── -->
    <div class="panel" id="panel-publications">
      <h2 class="publications-heading">Publications</h2>
      <div class="publications-list" id="publications-list"></div>
    </div>

  </main>
</div>

<script src="renderer.js"></script>
<script>
  /* Tab switching */
  const tabs   = document.querySelectorAll('.tab-btn');
  const panels = document.querySelectorAll('.panel');

  tabs.forEach(tab => {
    tab.addEventListener('click', () => {
      tabs.forEach(t => t.classList.remove('active'));
      panels.forEach(p => p.classList.remove('active'));
      tab.classList.add('active');
      document.getElementById('panel-' + tab.dataset.tab).classList.add('active');
    });
  });

  /* Load portfolio data and render all dynamic content */
  document.addEventListener('DOMContentLoaded', async () => {
    const data = await fetch('data/portfolio.json').then(r => r.json());

    /* Sidebar */
    document.querySelector('.sidebar__name').textContent    = data.sidebar.name;
    document.querySelector('.sidebar__title').innerHTML     = data.sidebar.titleLines.join('<br>');
    document.querySelector('.sidebar__tagline').textContent = data.sidebar.tagline;
    document.getElementById('sidebar-tags').innerHTML       = Renderer.tags(data.sidebar.tags);
    document.getElementById('sidebar-contact').innerHTML    = Renderer.contact(data.sidebar.contact);

    /* Work grid — respect showDrafts setting */
    const projectsToShow = data.showDrafts
      ? data.projects
      : data.projects.filter(p => p.status === 'live' || !p.status);
    document.getElementById('work-grid').innerHTML =
      projectsToShow.map(p => Renderer.projectCard(p)).join('');

    /* About */
    document.getElementById('about-body').innerHTML =
      data.about.paragraphs.map(p => `<p>${p}</p>`).join('');

    /* Publications */
    document.getElementById('publications-list').innerHTML =
      data.publications.map(pub => Renderer.article(pub)).join('');
  });
</script>

</body>
</html>
